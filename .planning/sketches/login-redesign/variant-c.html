<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Variante C — Glow Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 393px;
      height: 852px;
      overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
      color: #fff;
      background: #08051a;
    }

    .screen {
      width: 393px;
      height: 852px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(ellipse at center 38%, rgba(124, 58, 237, 0.55) 0%, transparent 50%),
        linear-gradient(180deg, #1a0a2e 0%, #08051a 100%);
    }

    /* Portal-Glow hinter Icon */
    .portal-glow {
      position: absolute;
      top: 90px;
      left: 50%;
      transform: translateX(-50%);
      width: 460px;
      height: 460px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(6, 182, 212, 0.55) 0%,
        rgba(124, 58, 237, 0.4) 35%,
        rgba(236, 72, 153, 0.25) 60%,
        transparent 75%);
      filter: blur(30px);
      pointer-events: none;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.9; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
    }

    /* Portal-Ring */
    .portal-ring {
      position: absolute;
      top: 110px;
      left: 50%;
      transform: translateX(-50%);
      width: 320px;
      height: 320px;
      border-radius: 50%;
      border: 1px solid rgba(6, 182, 212, 0.4);
      box-shadow:
        inset 0 0 60px rgba(6, 182, 212, 0.2),
        0 0 40px rgba(236, 72, 153, 0.25);
      pointer-events: none;
    }
    .portal-ring--outer {
      width: 420px;
      height: 420px;
      top: 60px;
      border-color: rgba(236, 72, 153, 0.2);
      box-shadow:
        inset 0 0 40px rgba(236, 72, 153, 0.1),
        0 0 30px rgba(124, 58, 237, 0.3);
    }

    /* Icon als Portal */
    .portal-icon {
      position: absolute;
      top: 170px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 200px;
      filter:
        drop-shadow(0 0 40px rgba(6, 182, 212, 0.6))
        drop-shadow(0 0 80px rgba(236, 72, 153, 0.4));
      z-index: 1;
    }

    /* Hairline Akzente */
    .hairline {
      position: absolute;
      pointer-events: none;
    }
    .hairline.h {
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(6, 182, 212, 0.5) 50%, transparent 100%);
    }
    .hairline.v {
      width: 1px;
      background: linear-gradient(180deg, transparent 0%, rgba(236, 72, 153, 0.4) 50%, transparent 100%);
    }

    /* Title above form */
    .title-wrap {
      position: absolute;
      top: 405px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 2;
    }
    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: 10px;
      color: #fff;
      text-shadow:
        0 0 20px rgba(6, 182, 212, 0.6),
        0 0 40px rgba(124, 58, 237, 0.4);
      line-height: 1;
    }
    .subtitle {
      margin-top: 6px;
      font-size: 0.72rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #67e8f9;
      opacity: 0.9;
    }

    /* Form floating Glass */
    .form {
      position: absolute;
      bottom: 110px;
      left: 24px;
      right: 24px;
      z-index: 3;
      padding: 24px 22px 20px 22px;
      background: rgba(15, 10, 35, 0.65);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(6, 182, 212, 0.15) inset,
        0 0 30px rgba(124, 58, 237, 0.25);
    }

    .form::before {
      content: '';
      position: absolute;
      top: 0;
      left: 24px;
      right: 24px;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(6, 182, 212, 0.7) 50%, transparent 100%);
    }

    .field {
      margin-bottom: 12px;
    }
    .field__label {
      font-size: 0.68rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #67e8f9;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .field__input {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 13px 14px;
      color: #fff;
      font-family: inherit;
      font-size: 0.92rem;
      outline: none;
    }
    .field__input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .btn {
      margin-top: 4px;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(90deg, #ec4899 0%, #7c3aed 50%, #06b6d4 100%);
      background-size: 200% 100%;
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 4px;
      cursor: pointer;
      box-shadow:
        0 8px 24px rgba(124, 58, 237, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.1) inset;
      animation: shimmer 5s ease infinite;
    }
    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .btn::after {
      content: ' →';
    }

    .forgot {
      text-align: center;
      margin-top: 12px;
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.5);
    }

    .register {
      position: absolute;
      bottom: 40px;
      left: 0;
      right: 0;
      text-align: center;
      padding: 0 32px;
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.5);
      z-index: 3;
    }
    .register strong {
      color: #67e8f9;
    }
  </style>
</head>
<body>
  <div class="screen">
    <!-- Portal Layers -->
    <div class="portal-glow"></div>
    <div class="portal-ring portal-ring--outer"></div>
    <div class="portal-ring"></div>
    <img src="icon.png" class="portal-icon" alt="">

    <!-- Hairlines -->
    <div class="hairline h" style="top: 50px; left: 20px; right: 20px;"></div>
    <div class="hairline h" style="top: 80px; left: 60px; right: 60px;"></div>
    <div class="hairline v" style="top: 40px; bottom: 40px; left: 20px;"></div>
    <div class="hairline v" style="top: 40px; bottom: 40px; right: 20px;"></div>

    <div class="title-wrap">
      <div class="title">KONFI QUEST</div>
      <div class="subtitle">Tritt ein</div>
    </div>

    <div class="form">
      <div class="field">
        <div class="field__label">Benutzername</div>
        <input class="field__input" placeholder="konfi.mueller" value="konfi.mueller">
      </div>
      <div class="field">
        <div class="field__label">Passwort</div>
        <input class="field__input" type="password" placeholder="•••••••••" value="••••••••">
      </div>
      <button class="btn">Anmelden</button>
      <div class="forgot">Passwort vergessen?</div>
    </div>

    <div class="register">
      Noch keinen Account? <strong>Mit Einladungscode registrieren</strong>
    </div>
  </div>
</body>
</html>
