<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Variante A — Cosmic Quest</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 393px;
      height: 852px;
      overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
      color: #fff;
      background: #0a0512;
    }

    .screen {
      width: 393px;
      height: 852px;
      position: relative;
      background:
        radial-gradient(circle at 20% 20%, rgba(124, 58, 237, 0.35) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.25) 0%, transparent 45%),
        radial-gradient(circle at 50% 50%, rgba(6, 182, 212, 0.15) 0%, transparent 50%),
        linear-gradient(180deg, #0a0512 0%, #1a0a2e 50%, #0a0a1f 100%);
      overflow: hidden;
    }

    /* Icon riesig, transparent, leicht geblurrt */
    .bg-icon {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      width: 380px;
      height: 380px;
      opacity: 0.10;
      filter: blur(2px);
      pointer-events: none;
    }

    /* Sterne / Glow-Partikel */
    .star {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .star.cyan {
      background: radial-gradient(circle, #06b6d4 0%, transparent 70%);
      filter: blur(8px);
    }
    .star.pink {
      background: radial-gradient(circle, #ec4899 0%, transparent 70%);
      filter: blur(10px);
    }
    .star.gold {
      background: radial-gradient(circle, #f59e0b 0%, transparent 70%);
      filter: blur(6px);
    }
    .star.dot {
      background: #fff;
      box-shadow: 0 0 8px #fff;
    }

    /* Hero */
    .hero {
      position: relative;
      z-index: 2;
      padding: 90px 32px 0 32px;
      text-align: center;
    }
    .hero__title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.4rem;
      letter-spacing: 8px;
      line-height: 0.95;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #fff 0%, #c4b5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 40px rgba(167, 139, 250, 0.4);
      filter: drop-shadow(0 4px 24px rgba(124, 58, 237, 0.4));
    }
    .hero__divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 16px auto 14px;
      width: 60%;
    }
    .hero__divider::before,
    .hero__divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(6, 182, 212, 0.6) 50%, transparent 100%);
    }
    .hero__divider-icon {
      color: #06b6d4;
      font-size: 0.7rem;
      text-shadow: 0 0 12px #06b6d4;
    }
    .hero__subtitle {
      font-size: 0.85rem;
      opacity: 0.7;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #a5f3fc;
    }

    /* Form Glass-Panel */
    .form {
      position: relative;
      z-index: 2;
      margin: 60px 24px 0 24px;
      padding: 28px 24px 24px 24px;
      background: rgba(15, 15, 30, 0.55);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(6, 182, 212, 0.25);
      border-radius: 24px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 30px 80px rgba(0, 0, 0, 0.5),
        0 0 40px rgba(6, 182, 212, 0.15);
    }

    .field {
      margin-bottom: 14px;
    }
    .field__label {
      font-size: 0.7rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #67e8f9;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .field__input {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 14px 14px;
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
    }
    .field__input::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }

    .btn {
      margin-top: 6px;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #ec4899 0%, #7c3aed 50%, #06b6d4 100%);
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 4px;
      cursor: pointer;
      box-shadow:
        0 12px 32px rgba(124, 58, 237, 0.45),
        0 0 0 1px rgba(255, 255, 255, 0.1) inset;
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '→';
      margin-left: 12px;
    }

    .forgot {
      text-align: center;
      margin-top: 14px;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
      text-decoration: underline;
    }

    .register {
      text-align: center;
      margin-top: 20px;
      padding: 0 32px;
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.55);
      position: relative;
      z-index: 2;
    }
    .register strong {
      color: #67e8f9;
    }
  </style>
</head>
<body>
  <div class="screen">
    <img src="icon.png" class="bg-icon" alt="">

    <!-- Sterne -->
    <div class="star pink" style="top: 80px; left: 30px; width: 50px; height: 50px;"></div>
    <div class="star cyan" style="top: 200px; right: 20px; width: 70px; height: 70px;"></div>
    <div class="star gold" style="top: 380px; left: 20px; width: 40px; height: 40px;"></div>
    <div class="star cyan" style="bottom: 200px; right: 40px; width: 60px; height: 60px;"></div>
    <div class="star pink" style="bottom: 100px; left: 50px; width: 80px; height: 80px;"></div>

    <!-- weisse Dots -->
    <div class="star dot" style="top: 110px; left: 80px; width: 2px; height: 2px;"></div>
    <div class="star dot" style="top: 150px; right: 90px; width: 3px; height: 3px;"></div>
    <div class="star dot" style="top: 300px; left: 280px; width: 2px; height: 2px;"></div>
    <div class="star dot" style="top: 420px; left: 60px; width: 3px; height: 3px;"></div>
    <div class="star dot" style="top: 250px; left: 180px; width: 2px; height: 2px;"></div>

    <div class="hero">
      <h1 class="hero__title">KONFI<br>QUEST</h1>
      <div class="hero__divider">
        <span class="hero__divider-icon">◆</span>
      </div>
      <p class="hero__subtitle">Bereit für die nächste Quest?</p>
    </div>

    <div class="form">
      <div class="field">
        <div class="field__label">Benutzername</div>
        <input class="field__input" placeholder="konfi.mueller" value="konfi.mueller">
      </div>
      <div class="field">
        <div class="field__label">Passwort</div>
        <input class="field__input" type="password" placeholder="•••••••••" value="••••••••">
      </div>
      <button class="btn">Anmelden</button>
      <div class="forgot">Passwort vergessen?</div>
    </div>

    <div class="register">
      Noch keinen Account? <strong>Mit Einladungscode registrieren</strong>
    </div>
  </div>
</body>
</html>
