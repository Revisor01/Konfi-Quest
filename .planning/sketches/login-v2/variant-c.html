<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login Variante C — Verspielt / Bubbles</title>
<style>
  :root { --konfi: #5b21b6; --cyan: #06b6d4; --teamer: #be185d; --gold: #f59e0b; --gemeinde: #059669; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #120e26; padding: 20px;
  }
  .phone {
    width: 390px; height: 844px; border-radius: 48px; overflow: hidden;
    position: relative; box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  .bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 25% 8%, rgba(124,58,237,0.7) 0%, transparent 45%),
      radial-gradient(circle at 90% 88%, rgba(6,182,212,0.55) 0%, transparent 48%),
      linear-gradient(165deg, #2a1065 0%, #1e1b4b 55%, #0c2c4d 100%);
  }
  /* Bunte schwebende Bubbles (Sektionsfarben) */
  .bubble { position: absolute; border-radius: 50%; filter: blur(1px); opacity: 0.9; }
  .b1 { width: 14px; height: 14px; background: var(--gold);     top: 120px; left: 50px; }
  .b2 { width: 10px; height: 10px; background: var(--cyan);     top: 90px;  right: 70px; }
  .b3 { width: 18px; height: 18px; background: var(--teamer);   top: 240px; right: 40px; }
  .b4 { width: 8px;  height: 8px;  background: var(--gemeinde); top: 300px; left: 60px; }
  .b5 { width: 12px; height: 12px; background: var(--gold);     bottom: 240px; left: 40px; }
  .b6 { width: 16px; height: 16px; background: var(--cyan);     bottom: 180px; right: 56px; }
  /* Logo-Ghost */
  .logo-ghost { position: absolute; bottom: -100px; left: -90px; width: 360px; height: 360px; opacity: 0.1; transform: rotate(14deg); }
  .content { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; padding: 0 28px; color: #fff; }
  /* Logo im Glaskreis */
  .mark-wrap {
    margin-top: 110px; width: 110px; height: 110px; border-radius: 32px;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 16px 40px rgba(0,0,0,0.3);
  }
  .mark-wrap img { width: 68px; height: 68px; }
  h1 { margin-top: 24px; font-size: 38px; font-weight: 800; letter-spacing: 1px; text-align: center; }
  .sub { margin-top: 10px; font-size: 14px; color: rgba(255,255,255,0.8); }
  .card { width: 100%; margin-top: 34px; }
  .field { margin-bottom: 13px; }
  .field .input {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 16px; padding: 16px 18px;
  }
  .field .input svg { width: 19px; height: 19px; color: var(--cyan); flex: 0 0 auto; }
  .field .input span { color: rgba(255,255,255,0.55); font-size: 15px; }
  .btn {
    width: 100%; margin-top: 8px; padding: 17px; border: none; border-radius: 18px;
    background: linear-gradient(135deg, #a855f7 0%, #06b6d4 100%);
    color: #fff; font-size: 16px; font-weight: 800; cursor: pointer;
    box-shadow: 0 12px 32px rgba(168,85,247,0.45);
  }
  .row { display: flex; justify-content: space-between; align-items: center; margin-top: 18px; }
  .row a { color: rgba(255,255,255,0.8); font-size: 13px; text-decoration: none; font-weight: 600; }
  .row .code { color: var(--cyan); font-weight: 700; display: flex; align-items: center; gap: 6px; }
  .row .code svg { width: 15px; height: 15px; }
</style>
</head>
<body>
  <div class="phone">
    <div class="bg"></div>
    <span class="bubble b1"></span><span class="bubble b2"></span><span class="bubble b3"></span>
    <span class="bubble b4"></span><span class="bubble b5"></span><span class="bubble b6"></span>
    <img class="logo-ghost" src="logo-mark.png" alt="" />
    <div class="content">
      <div class="mark-wrap"><img src="logo-mark.png" alt="" /></div>
      <h1>Konfi Quest</h1>
      <div class="sub">Bereit für die nächste Quest?</div>
      <div class="card">
        <div class="field">
          <div class="input">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg>
            <span>Benutzername</span>
          </div>
        </div>
        <div class="field">
          <div class="input">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
            <span>Passwort</span>
          </div>
        </div>
        <button class="btn">Anmelden</button>
        <div class="row">
          <a href="#">Passwort vergessen?</a>
          <a href="#" class="code">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M2 12h4M18 12h4M5 5l3 3M16 16l3 3M19 5l-3 3M8 16l-3 3"/></svg>
            Code einlösen
          </a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
