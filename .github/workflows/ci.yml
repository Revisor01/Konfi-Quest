name: CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository_owner }}/konfi-quest-backend
  FRONTEND_IMAGE: ${{ github.repository_owner }}/konfi-quest-frontend

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Security audit
        working-directory: backend
        run: npm audit --audit-level=critical

      - name: Run tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          JWT_SECRET: test-secret-ci
          NODE_ENV: test
        run: npx vitest run --config tests/vitest.config.ts --passWithNoTests

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Security audit
        working-directory: frontend
        run: npm audit --audit-level=critical || true

      - name: Run tests
        working-directory: frontend
        run: npx vitest run --passWithNoTests

  build-and-push:
    needs: [backend-test, frontend-test]
    # KEIN always() — Build+Deploy laufen NUR wenn backend-test UND frontend-test
    # gruen sind (Default-needs-Verhalten). Das ist das eigentliche Test-Gate:
    # Tests rot -> kein Build -> kein Webhook -> kein Deploy.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - context: ./backend
            image_env: BACKEND_IMAGE
          - context: ./frontend
            image_env: FRONTEND_IMAGE

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env[matrix.image_env] }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # GIT_SHA ins Backend-Image fuer /api/status (frontend ignoriert das ARG)
          build-args: |
            GIT_SHA=${{ github.sha }}

  deploy:
    # Eigener Job NACH build-and-push: wartet bis BEIDE Images (backend+frontend)
    # gepusht sind, dann ein einziger Webhook-Trigger. Vermeidet das Timing-Problem
    # (Webhook feuerte frueher im backend-Matrixzweig, bevor das frontend-Image
    # fertig auf ghcr lag -> frontend deployte mit altem Image).
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy + verify (Webhook pull, dann /api/status == github.sha)
        run: |
          # Selbst-verifizierender Deploy: Webhook ausloesen (?pullimage=true ist
          # ZWINGEND, sonst zieht der Stack das neue Image NICHT), dann pollen ob
          # /api/status den erwarteten Commit meldet. Faengt das ghcr-Propagations-
          # Race ab (Webhook feuert evtl. Sek. bevor :latest verfuegbar ist ->
          # zieht altes Image). Bis zu 3 Webhook-Runden, sonst Job ROT.
          SHA="${{ github.sha }}"
          STATUS_URL="https://konfi-quest.de/api/status"
          WEBHOOK="${{ secrets.PORTAINER_WEBHOOK }}?pullimage=true"

          deployed=false
          for round in 1 2 3; do
            echo "== Deploy-Runde $round =="
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$WEBHOOK")
            echo "Webhook HTTP $code"
            if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
              echo "::warning::Webhook HTTP $code in Runde $round"
            fi
            # bis zu ~2 Min auf den richtigen Commit warten
            for i in $(seq 1 12); do
              sleep 10
              live=$(curl -s "$STATUS_URL" | python3 -c "import sys,json;print(json.load(sys.stdin).get('commit',''))" 2>/dev/null || echo "")
              if [ "$live" = "$SHA" ]; then
                echo "OK: live commit == $SHA"
                deployed=true
                break
              fi
              echo "  warte... live='${live:0:12}' erwartet='${SHA:0:12}'"
            done
            [ "$deployed" = true ] && break
          done

          if [ "$deployed" != true ]; then
            echo "::error::Deploy nicht verifiziert — /api/status meldet nicht $SHA"
            exit 1
          fi
