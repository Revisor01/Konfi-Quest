name: CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository_owner }}/konfi-quest-backend
  FRONTEND_IMAGE: ${{ github.repository_owner }}/konfi-quest-frontend

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Security audit
        working-directory: backend
        run: npm audit --audit-level=critical

      - name: Run tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          JWT_SECRET: test-secret-ci
          NODE_ENV: test
        run: npx vitest run --config tests/vitest.config.ts --passWithNoTests

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Security audit
        working-directory: frontend
        run: npm audit --audit-level=critical || true

      - name: Run tests
        working-directory: frontend
        run: npx vitest run --passWithNoTests

  build-and-push:
    needs: [backend-test, frontend-test]
    # KEIN always() — Build+Deploy laufen NUR wenn backend-test UND frontend-test
    # gruen sind (Default-needs-Verhalten). Das ist das eigentliche Test-Gate:
    # Tests rot -> kein Build -> kein Webhook -> kein Deploy.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - context: ./backend
            image_env: BACKEND_IMAGE
          - context: ./frontend
            image_env: FRONTEND_IMAGE

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env[matrix.image_env] }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # GIT_SHA ins Backend-Image fuer /api/status (frontend ignoriert das ARG)
          build-args: |
            GIT_SHA=${{ github.sha }}

  deploy:
    # Eigener Job NACH build-and-push: wartet bis BEIDE Images (backend+frontend)
    # auf ghcr sind, dann EIN Redeploy des Stacks.
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Redeploy via Portainer-API (pullImage) + Health-Verify
        env:
          P_URL: ${{ secrets.PORTAINER_URL }}
          P_KEY: ${{ secrets.PORTAINER_API_KEY }}
          STACK_ID: "249"
          ENDPOINT_ID: "1"
        run: |
          # WICHTIG: Der Stack-WEBHOOK zieht bei einem file-basierten (nicht-git)
          # Stack das neue Image NICHT zuverlaessig -> Server lief sonst auf altem
          # Code. Zuverlaessig ist NUR update_stack mit pullImage:true ueber die
          # Portainer-API (PUT /api/stacks/249?endpointId=1). Verifiziert 09.06.
          set -e

          # 1) aktuellen compose-Content vom Stack in Datei holen
          curl -sf -H "X-API-Key: $P_KEY" "$P_URL/api/stacks/$STACK_ID/file" \
            | python3 -c "import sys,json;open('compose.yml','w').write(json.load(sys.stdin)['StackFileContent'])"
          test -s compose.yml || { echo "::error::compose leer"; exit 1; }

          # 2) Redeploy mit pullImage:true (zieht :latest neu, kein git noetig)
          code=$(python3 <<'PY'
          import json,os,urllib.request,urllib.error
          url,key=os.environ["P_URL"],os.environ["P_KEY"]
          sid,eid=os.environ["STACK_ID"],os.environ["ENDPOINT_ID"]
          compose=open("compose.yml").read()
          body=json.dumps({"stackFileContent":compose,"env":[],"prune":False,"pullImage":True}).encode()
          req=urllib.request.Request(f"{url}/api/stacks/{sid}?endpointId={eid}",data=body,method="PUT")
          req.add_header("X-API-Key",key); req.add_header("Content-Type","application/json")
          try:
              r=urllib.request.urlopen(req,timeout=180); print(r.status)
          except urllib.error.HTTPError as e:
              print(e.code)
          PY
          )
          echo "Redeploy HTTP $code"
          [ "$code" = "200" ] || { echo "::error::Redeploy fehlgeschlagen (HTTP $code)"; exit 1; }

          # 3) Health-Verify: App muss gesund hochkommen (DB ok). KEIN strikter
          #    commit==sha-Check, weil Frontend-only-Commits kein neues Backend-
          #    Image bauen -> /api/status bliebe korrekt beim letzten Backend-Commit.
          for i in $(seq 1 18); do
            sleep 10
            s=$(curl -s https://konfi-quest.de/api/status || echo "")
            db=$(printf '%s' "$s" | python3 -c "import sys,json;print(json.load(sys.stdin).get('checks',{}).get('database',''))" 2>/dev/null || echo "")
            if [ "$db" = "ok" ]; then
              echo "OK App gesund nach Redeploy: $s"
              exit 0
            fi
            echo "  warte auf gesunden Status... ($i)"
          done
          echo "::error::App nach Redeploy nicht gesund (/api/status DB != ok)"
          exit 1
