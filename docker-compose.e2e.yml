services:
  e2e-db:
    image: postgres:16-alpine
    ports:
      - "5444:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  e2e-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5555:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@e2e-db:5432/postgres
      JWT_SECRET: e2e-test-secret-key-min-32-chars!!
      CORS_ORIGINS: "http://localhost:5556"
      PORT: "5000"
      NODE_ENV: test
    depends_on:
      e2e-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 10

  e2e-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:5555/api"
    ports:
      - "5556:80"
    depends_on:
      e2e-backend:
        condition: service_healthy
