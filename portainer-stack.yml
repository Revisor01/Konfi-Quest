version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    environment:
      POSTGRES_DB: konfi_db
      POSTGRES_USER: konfi_user
      POSTGRES_PASSWORD: konfi_secure_password_2025
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: Europe/Berlin
      PGTZ: Europe/Berlin
      SMTP_HOST: server.godsapp.de
      SMTP_PORT: 465
      SMTP_USER: team@konfi-quest.de
      SMTP_PASS: "NkqFQuTx877Sia6Pp"
    volumes:
      - /opt/Konfi-Quest/postgres:/var/lib/postgresql/data
      - /opt/Konfi-Quest/init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    extra_hosts:
      - "server.godsapp.de:213.109.162.132"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U konfi_user -d konfi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/revisor01/konfi-quest-backend:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    ports:
      - "127.0.0.1:8623:5000"
    environment:
      NODE_ENV: production
      JWT_SECRET: konfi-secret-super-secure-2025
      DATABASE_URL: postgresql://konfi_user:konfi_secure_password_2025@postgres:5432/konfi_db
      PGHOST: postgres
      PGUSER: konfi_user
      PGDATABASE: konfi_db
      PGPASSWORD: konfi_secure_password_2025
      PGPORT: 5432
      SMTP_HOST: server.godsapp.de
      SMTP_PORT: 465
      SMTP_USER: team@konfi-quest.de
      SMTP_PASS: "NkqFQuTx877Sia6Pp"
      LOSUNG_API_KEY: ksadh8324oijcff45rfdsvcvhoids44
    volumes:
      - /opt/Konfi-Quest/uploads:/app/uploads
    extra_hosts:
      - "server.godsapp.de:213.109.162.132"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/revisor01/konfi-quest-frontend:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    ports:
      - "127.0.0.1:8624:80"
    restart: unless-stopped
    depends_on:
      - backend
